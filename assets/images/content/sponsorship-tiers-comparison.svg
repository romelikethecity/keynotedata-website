<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <rect width="1200" height="500" fill="#F0F4F3"/>
  <text x="600" y="40" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#2D3748" text-anchor="middle">Sponsorship Tier Comparison</text>

  <!-- Gold tier -->
  <g transform="translate(40,70)">
    <rect width="360" height="380" rx="12" fill="#FAFBFA" stroke="#0F5132" stroke-width="2.5"/>
    <rect width="360" height="60" rx="12" fill="#0F5132"/>
    <rect y="48" width="360" height="12" fill="#0F5132"/>
    <text x="180" y="38" font-family="system-ui,sans-serif" font-size="16" font-weight="800" fill="#FAFBFA" text-anchor="middle">GOLD TIER</text>
    <text x="180" y="102" font-family="system-ui,sans-serif" font-size="32" font-weight="800" fill="#0F5132" text-anchor="middle">$85K</text>
    <text x="180" y="122" font-family="system-ui,sans-serif" font-size="11" fill="#A0AEC0" text-anchor="middle">Per event</text>
    <line x1="30" y1="142" x2="330" y2="142" stroke="#E2E8F0"/>

    <g transform="translate(30,162)">
      <circle cx="6" cy="6" r="5" fill="#0F5132"/>
      <text x="20" y="10" font-family="system-ui,sans-serif" font-size="12" fill="#2D3748">Keynote speaking slot (45min)</text>
    </g>
    <g transform="translate(30,192)">
      <circle cx="6" cy="6" r="5" fill="#0F5132"/>
      <text x="20" y="10" font-family="system-ui,sans-serif" font-size="12" fill="#2D3748">20x20 booth, premium location</text>
    </g>
    <g transform="translate(30,222)">
      <circle cx="6" cy="6" r="5" fill="#0F5132"/>
      <text x="20" y="10" font-family="system-ui,sans-serif" font-size="12" fill="#2D3748">Attendee list (full access)</text>
    </g>
    <g transform="translate(30,252)">
      <circle cx="6" cy="6" r="5" fill="#0F5132"/>
      <text x="20" y="10" font-family="system-ui,sans-serif" font-size="12" fill="#2D3748">Logo on main stage backdrop</text>
    </g>
    <g transform="translate(30,282)">
      <circle cx="6" cy="6" r="5" fill="#0F5132"/>
      <text x="20" y="10" font-family="system-ui,sans-serif" font-size="12" fill="#2D3748">12 passes + VIP dinner</text>
    </g>
    <g transform="translate(30,312)">
      <circle cx="6" cy="6" r="5" fill="#0F5132"/>
      <text x="20" y="10" font-family="system-ui,sans-serif" font-size="12" fill="#2D3748">Email blast to attendees</text>
    </g>
    <g transform="translate(30,342)">
      <rect width="300" height="28" rx="6" fill="#5B9E7A" opacity="0.15"/>
      <text x="150" y="18" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#0F5132" text-anchor="middle">Est. 280 booth visits</text>
    </g>
  </g>

  <!-- Silver tier -->
  <g transform="translate(420,70)">
    <rect width="360" height="380" rx="12" fill="#FAFBFA" stroke="#5B9E7A" stroke-width="2"/>
    <rect width="360" height="60" rx="12" fill="#5B9E7A"/>
    <rect y="48" width="360" height="12" fill="#5B9E7A"/>
    <text x="180" y="38" font-family="system-ui,sans-serif" font-size="16" font-weight="800" fill="#FAFBFA" text-anchor="middle">SILVER TIER</text>
    <text x="180" y="102" font-family="system-ui,sans-serif" font-size="32" font-weight="800" fill="#0F5132" text-anchor="middle">$42K</text>
    <text x="180" y="122" font-family="system-ui,sans-serif" font-size="11" fill="#A0AEC0" text-anchor="middle">Per event</text>
    <line x1="30" y1="142" x2="330" y2="142" stroke="#E2E8F0"/>

    <g transform="translate(30,162)">
      <circle cx="6" cy="6" r="5" fill="#5B9E7A"/>
      <text x="20" y="10" font-family="system-ui,sans-serif" font-size="12" fill="#2D3748">Breakout session (25min)</text>
    </g>
    <g transform="translate(30,192)">
      <circle cx="6" cy="6" r="5" fill="#5B9E7A"/>
      <text x="20" y="10" font-family="system-ui,sans-serif" font-size="12" fill="#2D3748">10x10 booth, high-traffic area</text>
    </g>
    <g transform="translate(30,222)">
      <circle cx="6" cy="6" r="5" fill="#5B9E7A"/>
      <text x="20" y="10" font-family="system-ui,sans-serif" font-size="12" fill="#2D3748">Attendee list (opt-in only)</text>
    </g>
    <g transform="translate(30,252)">
      <circle cx="6" cy="6" r="5" fill="#5B9E7A"/>
      <text x="20" y="10" font-family="system-ui,sans-serif" font-size="12" fill="#2D3748">Logo in program guide</text>
    </g>
    <g transform="translate(30,282)">
      <circle cx="6" cy="6" r="5" fill="#5B9E7A"/>
      <text x="20" y="10" font-family="system-ui,sans-serif" font-size="12" fill="#2D3748">6 passes + reception invite</text>
    </g>
    <g transform="translate(30,312)">
      <circle cx="6" cy="6" r="5" fill="#A0AEC0"/>
      <text x="20" y="10" font-family="system-ui,sans-serif" font-size="12" fill="#A0AEC0">No email blast</text>
    </g>
    <g transform="translate(30,342)">
      <rect width="300" height="28" rx="6" fill="#5B9E7A" opacity="0.15"/>
      <text x="150" y="18" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#0F5132" text-anchor="middle">Est. 140 booth visits</text>
    </g>
  </g>

  <!-- Bronze tier -->
  <g transform="translate(800,70)">
    <rect width="360" height="380" rx="12" fill="#FAFBFA" stroke="#D4DDD8" stroke-width="1.5"/>
    <rect width="360" height="60" rx="12" fill="#A0AEC0"/>
    <rect y="48" width="360" height="12" fill="#A0AEC0"/>
    <text x="180" y="38" font-family="system-ui,sans-serif" font-size="16" font-weight="800" fill="#FAFBFA" text-anchor="middle">BRONZE TIER</text>
    <text x="180" y="102" font-family="system-ui,sans-serif" font-size="32" font-weight="800" fill="#2D3748" text-anchor="middle">$18K</text>
    <text x="180" y="122" font-family="system-ui,sans-serif" font-size="11" fill="#A0AEC0" text-anchor="middle">Per event</text>
    <line x1="30" y1="142" x2="330" y2="142" stroke="#E2E8F0"/>

    <g transform="translate(30,162)">
      <circle cx="6" cy="6" r="5" fill="#A0AEC0"/>
      <text x="20" y="10" font-family="system-ui,sans-serif" font-size="12" fill="#A0AEC0">No speaking slot</text>
    </g>
    <g transform="translate(30,192)">
      <circle cx="6" cy="6" r="5" fill="#A0AEC0"/>
      <text x="20" y="10" font-family="system-ui,sans-serif" font-size="12" fill="#2D3748">6x6 tabletop, expo hall</text>
    </g>
    <g transform="translate(30,222)">
      <circle cx="6" cy="6" r="5" fill="#A0AEC0"/>
      <text x="20" y="10" font-family="system-ui,sans-serif" font-size="12" fill="#A0AEC0">No attendee list</text>
    </g>
    <g transform="translate(30,252)">
      <circle cx="6" cy="6" r="5" fill="#A0AEC0"/>
      <text x="20" y="10" font-family="system-ui,sans-serif" font-size="12" fill="#2D3748">Logo on sponsor page</text>
    </g>
    <g transform="translate(30,282)">
      <circle cx="6" cy="6" r="5" fill="#A0AEC0"/>
      <text x="20" y="10" font-family="system-ui,sans-serif" font-size="12" fill="#2D3748">3 passes</text>
    </g>
    <g transform="translate(30,312)">
      <circle cx="6" cy="6" r="5" fill="#A0AEC0"/>
      <text x="20" y="10" font-family="system-ui,sans-serif" font-size="12" fill="#A0AEC0">No email / reception</text>
    </g>
    <g transform="translate(30,342)">
      <rect width="300" height="28" rx="6" fill="#A0AEC0" opacity="0.15"/>
      <text x="150" y="18" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#2D3748" text-anchor="middle">Est. 60 booth visits</text>
    </g>
  </g>
</svg>
