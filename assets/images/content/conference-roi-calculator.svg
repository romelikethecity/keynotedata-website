<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <rect width="1200" height="500" fill="#F0F4F3"/>
  <text x="600" y="40" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#2D3748" text-anchor="middle">Conference ROI Calculator</text>

  <!-- Spend card -->
  <g transform="translate(40,60)">
    <rect width="360" height="200" rx="10" fill="#FAFBFA" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="20" y="28" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#0F5132">Event Spend</text>
    <text x="20" y="72" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#2D3748">$142,800</text>
    <text x="20" y="94" font-family="system-ui,sans-serif" font-size="11" fill="#A0AEC0">Total invested</text>
    <g transform="translate(20,118)">
      <rect width="320" height="14" rx="3" fill="#0F5132" opacity="0.08"/>
      <rect width="140" height="14" rx="3" fill="#0F5132"/>
      <text x="0" y="30" font-family="system-ui,sans-serif" font-size="10" fill="#A0AEC0">Booth $62k</text>
    </g>
    <g transform="translate(20,152)">
      <rect width="320" height="14" rx="3" fill="#0F5132" opacity="0.08"/>
      <rect width="90" height="14" rx="3" fill="#5B9E7A"/>
      <text x="0" y="30" font-family="system-ui,sans-serif" font-size="10" fill="#A0AEC0">Travel $41k</text>
    </g>
  </g>

  <!-- Arrow -->
  <g transform="translate(405,145)">
    <line x1="0" y1="15" x2="26" y2="15" stroke="#5B9E7A" stroke-width="3"/>
    <polygon points="26,6 40,15 26,24" fill="#5B9E7A"/>
  </g>

  <!-- Pipeline card -->
  <g transform="translate(450,60)">
    <rect width="360" height="200" rx="10" fill="#FAFBFA" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="20" y="28" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#5B9E7A">Pipeline Generated</text>
    <text x="20" y="72" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#0F5132">$1.84M</text>
    <text x="20" y="94" font-family="system-ui,sans-serif" font-size="11" fill="#A0AEC0">Attributed opportunities</text>
    <!-- bars -->
    <g transform="translate(20,112)">
      <rect x="0" y="30" width="40" height="50" rx="3" fill="#0F5132" opacity="0.25"/>
      <rect x="55" y="20" width="40" height="60" rx="3" fill="#0F5132" opacity="0.45"/>
      <rect x="110" y="8" width="40" height="72" rx="3" fill="#0F5132" opacity="0.70"/>
      <rect x="165" y="0" width="40" height="80" rx="3" fill="#0F5132"/>
      <rect x="220" y="18" width="40" height="62" rx="3" fill="#5B9E7A" opacity="0.55"/>
      <rect x="275" y="34" width="40" height="46" rx="3" fill="#5B9E7A" opacity="0.35"/>
    </g>
  </g>

  <!-- Arrow -->
  <g transform="translate(815,145)">
    <line x1="0" y1="15" x2="26" y2="15" stroke="#5B9E7A" stroke-width="3"/>
    <polygon points="26,6 40,15 26,24" fill="#5B9E7A"/>
  </g>

  <!-- ROI card -->
  <g transform="translate(860,60)">
    <rect width="300" height="200" rx="10" fill="#0F5132"/>
    <text x="20" y="28" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#5B9E7A">ROI Multiple</text>
    <text x="20" y="90" font-family="system-ui,sans-serif" font-size="56" font-weight="800" fill="#FAFBFA">12.9x</text>
    <text x="20" y="116" font-family="system-ui,sans-serif" font-size="11" fill="#5B9E7A">Pipeline to spend ratio</text>
    <line x1="20" y1="134" x2="280" y2="134" stroke="#5B9E7A" stroke-width="1" opacity="0.3"/>
    <text x="20" y="158" font-family="system-ui,sans-serif" font-size="11" fill="#E8F0EC">Closed won: $412k</text>
    <text x="20" y="178" font-family="system-ui,sans-serif" font-size="11" fill="#E8F0EC">Influenced deals: 28</text>
  </g>

  <!-- Attribution row -->
  <g transform="translate(40,290)">
    <rect width="1120" height="70" rx="10" fill="#FAFBFA" stroke="#E2E8F0" stroke-width="1"/>
    <text x="20" y="28" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#0F5132">Deal Attribution by Touch</text>
    <g transform="translate(20,40)">
      <rect width="1080" height="18" rx="4" fill="#E8EDEB"/>
      <rect width="324" height="18" rx="4" fill="#0F5132"/>
      <rect x="324" width="270" height="18" fill="#5B9E7A"/>
      <rect x="594" width="216" height="18" fill="#0F5132" opacity="0.55"/>
      <rect x="810" width="162" height="18" fill="#5B9E7A" opacity="0.55"/>
      <rect x="972" y="0" width="108" height="18" rx="4" fill="#A0AEC0" opacity="0.5"/>
    </g>
  </g>

  <!-- Metrics -->
  <g transform="translate(40,380)">
    <rect width="1120" height="90" rx="10" fill="#0F5132"/>
    <g transform="translate(40,20)">
      <text x="0" y="24" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#FAFBFA">$6,571</text>
      <text x="0" y="46" font-family="system-ui,sans-serif" font-size="11" fill="#5B9E7A">Cost per qualified meeting</text>
    </g>
    <g transform="translate(260,20)">
      <text x="0" y="24" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#FAFBFA">18%</text>
      <text x="0" y="46" font-family="system-ui,sans-serif" font-size="11" fill="#5B9E7A">Booth visitor to meeting</text>
    </g>
    <g transform="translate(480,20)">
      <text x="0" y="24" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#FAFBFA">32%</text>
      <text x="0" y="46" font-family="system-ui,sans-serif" font-size="11" fill="#5B9E7A">Meeting to opportunity</text>
    </g>
    <g transform="translate(700,20)">
      <text x="0" y="24" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#FAFBFA">22%</text>
      <text x="0" y="46" font-family="system-ui,sans-serif" font-size="11" fill="#5B9E7A">Opp to closed won</text>
    </g>
    <g transform="translate(920,20)">
      <text x="0" y="24" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#5B9E7A">Payback</text>
      <text x="0" y="46" font-family="system-ui,sans-serif" font-size="11" fill="#E8F0EC">4.2 months</text>
    </g>
  </g>
</svg>
