<!-- ============================================
     KeynoteData — HTML Head Snippet
     Copy into <head> of every page
     ============================================ -->

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="/favicons/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16x16.png">

<!-- Apple Touch Icon -->
<link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png">

<!-- Android / PWA -->
<link rel="manifest" href="/favicons/site.webmanifest">

<!-- Windows -->
<meta name="msapplication-TileColor" content="#0F5132">
<meta name="msapplication-config" content="/favicons/browserconfig.xml">

<!-- Theme Color -->
<meta name="theme-color" content="#0F5132">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="KeynoteData">
<meta property="og:image" content="https://keynotedata.com/favicons/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://keynotedata.com/favicons/og-image.png">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Source+Sans+3:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
